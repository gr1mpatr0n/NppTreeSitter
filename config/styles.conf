# NppTreeSitter — capture-name to Scintilla style mapping.
#
# Format:  capture_name = style_number   (0–31)
#
# The style numbers here correspond to entries in the Notepad++ Style
# Configurator.  You'll also need a matching XML style definition file
# (see the README for details).
#
# The capture names come from the highlights.scm queries shipped with
# each tree-sitter grammar.  Dot-separated names are resolved with
# fallback: "function.builtin" tries an exact match first, then "function".

default              = 0
keyword              = 1
keyword.function     = 2
keyword.return       = 3
keyword.operator     = 4
string               = 5
string.special       = 6
number               = 7
float                = 8
function             = 9
function.builtin     = 10
function.call        = 11
method               = 12
method.call          = 13
type                 = 14
type.builtin         = 15
type.qualifier       = 16
variable             = 17
variable.builtin     = 18
variable.parameter   = 19
property             = 20
field                = 21
constant             = 22
constant.builtin     = 23
comment              = 24
operator             = 25
punctuation          = 26
punctuation.bracket  = 27
punctuation.delimiter= 28
label                = 29
attribute            = 30
constructor          = 31
